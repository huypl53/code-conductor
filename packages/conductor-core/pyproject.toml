[project]
name = "conductor-core"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "filelock>=3.16",
  "pydantic>=2.10",
  "claude-agent-sdk>=0.1.48",
  "typer>=0.12",
  "rich>=13",
]

[project.scripts]
conductor = "conductor.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/conductor"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
include = ["src"]
pythonVersion = "3.12"
typeCheckingMode = "standard"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = ["--import-mode=importlib"]
asyncio_mode = "auto"

[dependency-groups]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "pyright>=1.1", "ruff>=0.1"]
