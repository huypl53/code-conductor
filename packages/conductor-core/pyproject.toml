[project]
name = "conductor-ai"
version = "0.1.0"
description = "AI agent orchestration - a self-organizing team of coding agents"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [{ name = "Conductor Team" }]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
  "filelock>=3.16",
  "pydantic>=2.10",
  "claude-agent-sdk>=0.1.48",
  "typer>=0.12",
  "rich>=13",
  "fastapi>=0.135",
  "uvicorn>=0.41",
  "watchfiles>=1.1",
]

[project.scripts]
conductor = "conductor.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/conductor"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
include = ["src"]
pythonVersion = "3.12"
typeCheckingMode = "standard"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = ["--import-mode=importlib"]
asyncio_mode = "auto"

[dependency-groups]
dev = [
    "pytest>=8",
 "pytest-asyncio>=0.23",
 "pyright>=1.1",
 "ruff>=0.1",
 "httpx>=0.27",
]
